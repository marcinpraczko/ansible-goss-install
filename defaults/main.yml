---
# == Detail about Goss binary files in GitHub ==
# https://github.com/aelsabbahy/goss/releases/
goss_arch: amd64
goss_version: v0.4.4
goss_sha256sum: 1c4f54b22fde9d4d5687939abc2606b0660a5d14a98afcd09b04b793d69acdc5

goss_dst_dir: "{{ [ansible_env.HOME,'bin'] | path_join }}"
goss_dst_dir_mode: 0755

goss_bin_filename: goss-linux-{{ goss_arch }}
goss_bin_symlink: goss
goss_url: "https://github.com/goss-org/goss/releases/download/{{ goss_version }}/{{ goss_bin_filename }}"

# == Variables related with file system ==
goss_create_dst_dir: True
